version: "3.9"

services:
  smartchain-api:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: smartchain-api

    ports:
      - "8000:8000"

    env_file:
      - backend/.env

    volumes:
      - .:/app

    restart: unless-stopped

    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload